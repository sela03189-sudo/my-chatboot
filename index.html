<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خبير الصيانة الذكي | AI Tech Expert</title>
    <style>
        :root {
            --primary-color: rgba(255, 255, 255, 0.08);
            --accent-color: #00d2ff;
            --bg-default: url('https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1920&auto=format&fit=crop');
        }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f2027; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        .dynamic-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: var(--bg-default); background-size: cover; background-position: center; opacity: 0.2; z-index: -1; }
        .chat-container { width: 95%; max-width: 600px; height: 85vh; background: var(--primary-color); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.6); display: flex; flex-direction: column; }
        .chat-header { padding: 20px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .chat-header h2 { margin: 0; color: var(--accent-color); text-shadow: 0 0 15px rgba(0, 210, 255, 0.4); }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .message { max-width: 85%; padding: 14px 20px; border-radius: 20px; font-size: 15px; line-height: 1.6; animation: fadeIn 0.4s ease; white-space: pre-wrap; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .bot-msg { align-self: flex-start; background: rgba(255, 255, 255, 0.12); color: #f0f0f0; border-bottom-right-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }
        .user-msg { align-self: flex-end; background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); color: #050505; font-weight: 500; border-bottom-left-radius: 4px; }
        .input-area { padding: 20px; display: flex; gap: 12px; background: rgba(0,0,0,0.3); border-radius: 0 0 30px 30px; }
        input { flex: 1; background: rgba(255, 255, 255, 0.07); border: 1px solid rgba(255,255,255,0.2); border-radius: 15px; padding: 14px; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent-color); background: rgba(255, 255, 255, 0.1); }
        button { background: var(--accent-color); color: #000; border: none; padding: 0 25px; border-radius: 15px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { transform: scale(1.05); background: #fff; }
        .loading-dots::after { content: '...'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } }
    </style>
</head>
<body>
    <div class="dynamic-bg"></div>
    <div class="chat-container">
        <div class="chat-header">
            <h2>🛠️ خبير الصيانة الذكي</h2>
            <small style="color: #aaa;">نظام التحليل التقني المتقدم</small>
        </div>
        <div id="chat-box"><div class="message bot-msg">مرحباً! كيف يمكنني مساعدتك تقنياً اليوم؟</div></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="اكتب مشكلتك هنا..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">إرسال</button>
        </div>
    </div>
    <script>
        const _p1 = "AIzaSyAM7tjT5bm";
        const _p2 = "IR2uSAiLHBc_vchX";
        const _p3 = "UN7DfMaY";
        const apiKey = _p1 + _p2 + _p3;

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;
            addMessage(text, 'user-msg');
            input.value = '';
            const loadingId = 'loading-' + Date.now();
            addMessage("جاري التحليل...", 'bot-msg', loadingId);
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "أنت خبير صيانة تقني. حل المشكلة التالية: " + text }] }] })
                });
                const data = await res.json();
                document.getElementById(loadingId).remove();
                if (data.candidates) {
                    addMessage(data.candidates[0].content.parts[0].text, 'bot-msg');
                }
            } catch (e) {
                document.getElementById(loadingId).remove();
                addMessage("حدث خطأ في الاتصال. يرجى المحاولة لاحقاً.", 'bot-msg');
            }
        }

        function addMessage(text, className, id = '') {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `message ${className} ${id ? 'loading-dots' : ''}`;
            if (id) div.id = id;
            div.innerText = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
