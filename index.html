<!DOCTYPE html>
<html lang="ar" dir="rtl">
<body>
    <div class="chat-container">
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="اكتب مشكلتك هنا...">
            <button onclick="sendMessage()">إرسال</button>
        </div>
    </div>

    <script>
        // هذه الدالة ستطلب منكِ المفتاح في أول مرة تفتحين فيها الموقع فقط
        function getApiKey() {
            let key = localStorage.getItem('my_safe_key');
            if (!key) {
                key = prompt("يرجى إدخال مفتاح API الخاص بكِ (سيتم حفظه في متصفحك فقط):");
                if (key) localStorage.setItem('my_safe_key', key);
            }
            return key;
        }

        async function sendMessage() {
            const apiKey = getApiKey();
            if (!apiKey) return alert("المفتاح مطلوب لتشغيل الخدمة");

            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, 'user-msg');
            input.value = '';

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });
                const data = await res.json();
                addMessage(data.candidates[0].content.parts[0].text, 'bot-msg');
            } catch (e) {
                addMessage("حدث خطأ، تأكدي من صحة المفتاح.", 'bot-msg');
            }
        }

        function addMessage(text, className) {
            const div = document.createElement('div');
            div.className = `message ${className}`;
            div.innerText = text;
            document.getElementById('chat-box').appendChild(div);
        }
    </script>
</body>
</html>
